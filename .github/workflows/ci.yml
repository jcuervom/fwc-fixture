name: CI & Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; no cancela el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=low
      - run: npm run build
      - run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  build-pages:
    name: Build Pages
    needs: quality
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - run: npm ci

      # base-href = /<nombre-del-repo>/  (necesario para project pages)
      - name: Build
        run: npx ng build --configuration production --base-href "/${{ github.event.repository.name }}/"

      # SPA fallback: 404 -> index.html
      - name: SPA fallback
        run: cp dist/fwc-fixture/browser/index.html dist/fwc-fixture/browser/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/fwc-fixture/browser

  deploy:
    name: Deploy Pages
    needs: build-pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
